<!DOCTYPE html>
<html lang="ja">
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            box-sizing: border-box;
            background: #0A0A0A;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .title {
            font-family: 'Roboto', sans-serif;
            font-size: 64px;
            color: #E0E0E0;
            text-align: center;
            margin-bottom: 20px;
            z-index: 1;
        }
        .subtitle {
            font-family: 'Roboto', sans-serif;
            font-size: 32px;
            color: #B0B0B0;
            text-align: center;
            margin-bottom: 40px;
            z-index: 1;
        }
        .author {
            font-family: 'Roboto', sans-serif;
            font-size: 20px;
            color: #B0B0B0;
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 1;
        }
        .geometric-shape {
            position: absolute;
            background-color: #00FF00;
            opacity: 0.1;
            transform: rotate(45deg);
        }
        .shape-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }
        .shape-2 {
            width: 600px;
            height: 600px;
            bottom: -200px;
            right: -200px;
            background-color: #FF0000;
            opacity: 0.15;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="geometric-shape shape-1"></div>
        <div class="geometric-shape shape-2"></div>
        <h1 class="title">やがみ式FX戦略「sena3fx」<br>バックテスト最終報告書 (v58)</h1>
        <p class="subtitle">1.0pipsスプレッド環境下での高精度ロジックの有効性</p>
        <p class="author">Manus AI</p>
    </div>
</body>
</html>
