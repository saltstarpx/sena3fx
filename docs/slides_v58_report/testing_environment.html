<!DOCTYPE html>
<html lang="ja">
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            box-sizing: border-box;
            background: #0A0A0A;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
            padding: 60px 80px;
        }
        .geometric-shape {
            position: absolute;
            background-color: #00FF00;
            opacity: 0.05;
            transform: rotate(45deg);
        }
        .shape-1 {
            width: 300px;
            height: 300px;
            top: -50px;
            left: -50px;
        }
        .shape-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            background-color: #FF0000;
            opacity: 0.05;
        }
        .content-left {
            width: 55%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
        }
        .content-right {
            width: 40%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
        }
        .title {
            font-family: 'Roboto', sans-serif;
            font-size: 32px;
            color: #E0E0E0;
            margin-bottom: 30px;
        }
        .param-item {
            font-family: 'Roboto', sans-serif;
            font-size: 20px;
            color: #B0B0B0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .param-item i {
            color: #00FF00;
            margin-right: 15px;
            font-size: 24px;
        }
        .param-label {
            font-weight: bold;
            color: #E0E0E0;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="geometric-shape shape-1"></div>
        <div class="geometric-shape shape-2"></div>
        <div class="content-left">
            <h2 class="title">2. 検証環境</h2>
            <div class="param-item">
                <i class="fas fa-calendar-alt"></i>
                <span class="param-label">データ期間:</span>
                <span>2026年1月1日 〜 2026年2月27日</span>
            </div>
            <div class="param-item">
                <i class="fas fa-chart-line"></i>
                <span class="param-label">通貨ペア:</span>
                <span>USDJPY (価格帯 1.56... EURUSD型)</span>
            </div>
            <div class="param-item">
                <i class="fas fa-exchange-alt"></i>
                <span class="param-label">スプレッド:</span>
                <span>1.0 pips (0.0001相当)</span>
            </div>
            <div class="param-item">
                <i class="fas fa-bullseye"></i>
                <span class="param-label">ターゲットRR:</span>
                <span>5.0 (動的ホールド)</span>
            </div>
        </div>
        <div class="content-right">
            <!-- Placeholder for potential image or additional context -->
        </div>
    </div>
</body>
</html>
