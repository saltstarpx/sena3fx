<!DOCTYPE html>
<html lang="ja">
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            box-sizing: border-box;
            background: #0A0A0A;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
            padding: 60px 80px;
        }
        .geometric-shape {
            position: absolute;
            background-color: #00FF00;
            opacity: 0.05;
            transform: rotate(45deg);
        }
        .shape-1 {
            width: 300px;
            height: 300px;
            top: -50px;
            left: -50px;
        }
        .shape-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            background-color: #FF0000;
            opacity: 0.05;
        }
        .content-left {
            width: 55%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
        }
        .content-right {
            width: 40%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
        }
        .title {
            font-family: 'Roboto', sans-serif;
            font-size: 32px;
            color: #E0E0E0;
            margin-bottom: 30px;
        }
        .logic-item {
            font-family: 'Roboto', sans-serif;
            font-size: 20px;
            color: #B0B0B0;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }
        .logic-item i {
            color: #00FF00;
            margin-right: 15px;
            font-size: 24px;
            line-height: 1.2;
        }
        .logic-title {
            font-weight: bold;
            color: #E0E0E0;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="geometric-shape shape-1"></div>
        <div class="geometric-shape shape-2"></div>
        <div class="content-left">
            <h2 class="title">3. 戦略ロジック (v58)</h2>
            <div class="logic-item">
                <i class="fas fa-layer-group"></i>
                <div>
                    <span class="logic-title">上位足意識 (MTF)</span>
                    <span>4H/1Hの形状形成を15Mで捉え、上位足の「髭」や「実体」になる動きを予測。</span>
                </div>
            </div>
            <div class="logic-item">
                <i class="fas fa-crosshairs"></i>
                <div>
                    <span class="logic-title">精度の追求</span>
                    <span>髭の50%戻しや、実体レベルの「壁」での反発をピンポイントで狙う。</span>
                </div>
            </div>
            <div class="logic-item">
                <i class="fas fa-shield-alt"></i>
                <div>
                    <span class="logic-title">損切りの緩和</span>
                    <span>ノイズによる不必要な損切りを防ぐため、15M髭先から僅かにバッファを確保。</span>
                </div>
            </div>
            <div class="logic-item">
                <i class="fas fa-chart-bar"></i>
                <div>
                    <span class="logic-title">期待値の最大化</span>
                    <span>RR 5.0をターゲットに、優位性のある高精度な場面のみにエントリーを絞る。</span>
                </div>
            </div>
        </div>
        <div class="content-right">
            <!-- Placeholder for potential image or additional context -->
        </div>
    </div>
</body>
</html>
